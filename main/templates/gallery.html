{% extends 'base.html' %}
{% load static %}
{% load custom_filters %}
{% block content %}


<!-- Header Start -->
<div class="container-fluid py-5 mb-5 page-header">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10 text-center">
                <h1 class="display-3 text-white animated slideInDown">Gallery</h1>

            </div>
        </div>
    </div>
</div>
<!-- Header End -->

<!-- Gallery Start -->
<div class="container-xxl py-5">
    <div class="container">
        <div class="text-center wow fadeInUp" data-wow-delay="0.1s">
            <h6 class="section-title text-center mb-3">Our Legacy</h6>
            <h1 class="mb-5">School Gallery</h1>
        </div>
        <div class="row g-4">
            {% for gallery in galleries %}
            <div class="col-lg-4 col-md-6 wow fadeInUp" data-wow-delay="{{ forloop.counter|mul:0.1 }}s">
                <div class="gallery-item position-relative overflow-hidden rounded-4 shadow-sm h-100">
                    <img alt="{{ gallery.name }}" class="img-fluid w-100 h-100" src="{{ gallery.image.url }}"
                        style="object-fit: cover; min-height: 300px;">
                    <div
                        class="gallery-overlay position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-dark bg-opacity-50 opacity-0 transition">
                        <h4 class="text-white text-center m-0 p-3">{{ gallery.name }}</h4>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
<!-- Gallery End -->


{% endblock content %}
